<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
<title>CodeVert Pro - Cloud Code Editor with Gmail Sync</title>
<meta name="google-site-verification" content="n0QZ_Ds1yBHuALmSs4iLYOeIzK8_1_AmQXJ6p2sSYuI" />
<meta name="description" content="Professional online HTML, CSS & JavaScript editor with Gmail authentication and cloud storage. Write, run and save code in the cloud.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1a33">

<!-- CodeMirror core + modes -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

<!-- Hints / completion -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/xml-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/css-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/javascript-hint.min.js"></script>

<!-- Close tags/brackets, matching -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>

<!-- Linting & linters -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/lint.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jshint/2.13.6/jshint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/javascript-lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/csslint/1.0.5/csslint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/css-lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/htmlhint/0.16.0/htmlhint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/lint/html-lint.min.js"></script>

<!-- Emmet for CodeMirror -->
<script src="https://cdn.jsdelivr.net/npm/emmet-codemirror-plugin@3.0.4/dist/emmet.min.js"></script>

<!-- JSZip for Export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<!-- Firebase SDK (Authentication + Firestore) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<!-- Default theme -->
<link id="cm-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

<style>
  :root{
    --bg:#0f172a; --panel:#111827; --text:#e5e7eb; --muted:#94a3b8;
    --key:#1f2937; --keyh:#374151; --accent:#22c55e; --accent2:#3b82f6;
    --warn:#ef4444; --shadow:0 10px 30px rgba(0,0,0,.35);
    --google-blue:#4285f4;
  }
  *{box-sizing:border-box}
  html,body{
    height:100%;
    -webkit-text-size-adjust: 100%;
    -ms-text-size-adjust: 100%;
    text-size-adjust: 100%;
    touch-action: manipulation;
  }
  body{
    margin:0; font-family:system-ui,Segoe UI,Roboto,Arial;
    background:radial-gradient(1200px 600px at -10% -10%,rgba(59,130,246,.18),transparent 40%),
               radial-gradient(1000px 500px at 120% 110%,rgba(34,197,94,.18),transparent 50%), var(--bg);
    color:var(--text); display:flex; flex-direction:column;
    overflow: hidden;
  }
  header{
    display:flex;
    gap:8px;
    align-items:center;
    padding:10px;
    background:rgba(255,255,255,.04);
    border-bottom:1px solid rgba(255,255,255,.08);
    position:sticky;
    top:0;
    flex-shrink:0;
    transition: transform 0.3s ease;
    z-index:100;
    flex-wrap: wrap;
  }
  header.hide{
    transform: translateY(-120%);
  }
  .hamburger{
    width:44px;height:40px; border-radius:12px; background:var(--key);
    display:grid; place-items:center; cursor:pointer; border:1px solid rgba(255,255,255,.08);
  }
  .hamburger div{ width:20px; height:2px; background:#fff; position:relative}
  .hamburger div::before,.hamburger div::after{
    content:""; position:absolute; width:100%; height:2px; background:#fff; left:0;
  }
  .hamburger div::before{ top:-6px } .hamburger div::after{ top:6px }

  .title{ font-weight:700; letter-spacing:.3px; margin-left:4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .spacer{flex:1}

  .btn {
    background: rgba(255, 255, 255, 0.15);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.25);
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    transition: background 0.3s ease, transform 0.2s ease;
    white-space: nowrap;
    font-size:14px;
  }
  .btn:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: translateY(-2px);
  }
  .btn.google-btn {
    background: var(--google-blue);
    color: white;
    border: none;
  }
  .btn.cloud-btn {
    background: var(--accent2);
  }
  
  /* File tabs container */
.file-tabs-container {
  display: flex;
  align-items: center;
  background: #1e1e2e;
  border-bottom: 2px solid #2d2d3a;
  padding: 8px 8px 0 8px;
  gap: 8px;
  min-height: 48px;
  overflow-x: auto;
  }
  /* File tabs wrapper */
.file-tabs {
  display: flex;
  gap: 4px;
  flex-wrap: nowrap;
  overflow-x: auto;
  flex: 1;
  }
.file-tab {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #2d2d3a;
  color: #e0e0e0;
  padding: 8px 16px;
  border-radius: 8px 8px 0 0;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
  border-left: 3px solid transparent;
  }
  .file-tab.active {
  background: #0ea5e9;
  color: white;
}

.file-tab[data-type="html"]:not(.active) {
  border-left-color: #f97316;
}

.file-tab[data-type="css"]:not(.active) {
  border-left-color: #3b82f6;
}

.file-tab[data-type="js"]:not(.active) {
  border-left-color: #eab308;
  }
  /* Close button */
.close-btn {
  font-size: 16px;
  padding: 0 4px;
  opacity: 0.7;
}

.close-btn:hover {
  opacity: 1;
  background: rgba(255,255,255,0.2);
  border-radius: 4px;
  }
  /* + ADD BUTTON */
.add-file-btn {
  background: #10b981;
  color: white;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 24px;
  font-weight: bold;
  transition: all 0.2s;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(16,185,129,0.3);
  }
  .add-file-btn:hover {
  background: #059669;
  transform: scale(1.1) rotate(90deg);
  }
  /* Editor container */
.editor-container {
  flex: 1;
  position: relative;
  min-height: 30px;
  }
  .editor-instance {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
}

.CodeMirror {
  height: 100% !important;
  }
  
  select, input[type="range"], input[type="text"] {
    background: rgba(255, 255, 255, 0.15);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    padding: 8px 10px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-size:14px;
  }
  input::placeholder {
    color: rgba(255,255,255,0.4);
  }

  #authSection {
    display: flex;
    align-items: center;
  }
  #userProfile {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.1);
    padding: 4px 8px 4px 4px;
    border-radius: 30px;
  }
  #userAvatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--accent2);
  }
  #userEmail {
    font-size: 13px;
    max-width: 150px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #loginBtn {
    background: #ea4335;
    color: white;
    border: none;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #loginBtn::before {
    content: "📧";
    font-size: 16px;
  }

  .wrap{ 
    flex:1; 
    display:flex; 
    min-height:0;
    overflow: hidden;
  }
  .editors{ display:flex; flex:1; min-width:0 }
  .pane{ 
    flex:1; 
    display:flex; 
    flex-direction:column; 
    min-width:0;
    height: 100%;
    overflow: hidden;
  }
  .tabs{ 
    display:flex; 
    gap:6px; 
    padding:8px; 
    border-bottom:1px solid rgba(255,255,255,.08);
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .tab{
    padding:6px 10px; background:var(--key); border:1px solid rgba(255,255,255,.08);
    border-radius:10px; cursor:pointer; user-select:none;
    white-space: nowrap;
  }
  .tab.active{ outline:2px solid var(--accent2) }
  .CodeMirror{ 
    height:calc(100vh - 240px); 
    min-height:280px;
    max-height: 100%;
  }
  .CodeMirror-scroll {
    min-height: 280px;
  }
  
  iframe#preview{
    flex:1; 
    border:none; 
    background:#fff; 
    min-width:260px;
    border-left:1px solid rgba(255,255,255,.1);
    width: 100%;
    height: 100%;
  }

  .console{
    height:120px; 
    overflow:auto; 
    background:#000; 
    color:#b3ffb3; 
    font-size:13px;
    font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    padding:6px 8px; 
    border-top:1px solid #222;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }
  .console .err{ color:#ff9b9b }
  .status{ font-size:12px; opacity:.8; margin-left:8px }
  .pill{ display:inline-block; padding:1px 8px; border-radius:999px; background:#0b3; color:#fff; font-size:12px}

  /* Hidden side menu */
  .menu{
    position:absolute; top:70px; left:10px; width:380px; max-width:90vw;
    background:var(--panel); box-shadow:var(--shadow); border-radius:16px;
    border:1px solid rgba(255,255,255,.08); padding:12px; display:none; z-index:1000;
    max-height: 80vh; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .menu.open{ display:block }
  .menu h4{ margin:12px 0 6px 0; color:var(--accent2); }
  .menu h4:first-child{ margin-top:4px; }
  .row{ display:flex; gap:8px; margin:8px 0; flex-wrap:wrap }
  .menu .btn{ width:calc(50% - 4px); }
  .menu .btn.full-width{ width:100%; }

  /* Resizer between editor and preview */
  .resizer{
    width:8px; cursor:col-resize; background:rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .size-buttons button{ padding:6px 8px }

  /* Phone frame */
  .phone-frame {
    width: 375px;
    height: 100%;
    border: 12px solid #222;
    border-radius: 36px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    transition: width 0.3s ease;
  }
  .phone-frame::before {
    content: "";
    width: 60px;
    height: 8px;
    background: #333;
    border-radius: 10px;
    position: absolute;
    top: 6px;
    z-index: 2;
  }
  #preview {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 24px;
    background: #fff;
  }

  /* Modal styles */
  .modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
  }
  .modal.show {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-content {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 16px;
    padding: 24px;
    max-width: 700px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: var(--shadow);
    -webkit-overflow-scrolling: touch;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .modal-header h3 {
    margin: 0;
    color: var(--accent2);
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text);
    font-size: 24px;
    cursor: pointer;
    padding: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
  }
  .modal-close:hover {
    background: rgba(255,255,255,.1);
  }

  /* Version history items */
  .version-item {
    padding: 12px;
    margin: 8px 0;
    background: rgba(255,255,255,.05);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,.1);
    cursor: pointer;
    transition: all 0.2s;
  }
  .version-item:hover {
    background: rgba(255,255,255,.1);
    transform: translateX(4px);
  }
  .version-item .version-time {
    font-size: 12px;
    color: var(--muted);
  }
  .version-item .version-label {
    font-weight: 600;
    color: var(--accent2);
  }

  /* Cloud project items */
  .cloud-project-item {
    padding: 10px;
    margin: 5px 0;
    background: rgba(66, 133, 244, 0.1);
    border-radius: 8px;
    border-left: 3px solid var(--accent2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .cloud-project-item:hover {
    background: rgba(66, 133, 244, 0.2);
  }
  .cloud-project-name {
    font-weight: 600;
    color: var(--accent2);
  }
  .cloud-project-date {
    font-size: 11px;
    color: var(--muted);
  }

  /* Mobile responsive */
  @media (max-width: 768px) {
    header {
      padding: 6px;
    }
    .title {
      font-size: 14px;
    }
    .btn {
      padding: 6px 8px;
      font-size: 12px;
    }
    #userEmail {
      max-width: 80px;
    }
    .wrap {
      flex-direction: column;
    }
    .phone-frame {
      width: 100% !important;
      height: 350px;
      border-width: 8px;
      border-radius: 24px;
    }
    .resizer {
      width: 100%;
      height: 8px;
      cursor: row-resize;
    }
    .menu {
      width: 95%;
      left: 2.5%;
    }
  }

  /* Touch optimizations */
  [contenteditable], input, textarea, select, button {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  input, select, textarea {
    font-size: 16px;
  }

  /* Sync status indicator */
  .sync-status {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .sync-status.online {
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
  }
  .sync-status.offline {
    background: #ef4444;
  }
  .sync-status.syncing {
    background: #f59e0b;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>
  <header>
    <button class="hamburger" id="menuBtn" aria-label="Menu"><div></div></button>
    <div class="title">CodeVert Pro ☁️</div>
    <span class="status" id="saveStatus">Saved</span>
    
    
    <!-- Authentication Section -->
    <div id="authSection">
      <button class="btn google-btn" id="loginBtn">Sign in with Gmail</button>
      <div id="userProfile" style="display:none;">
        <img id="userAvatar" src="" alt="avatar">
        <span id="userEmail"></span>
        <button class="btn" id="logoutBtn" style="background:#666; padding:4px 8px;">Logout</button>
      </div>
    </div>
    
    <span id="cloudSyncIndicator" title="Cloud sync status">
      <span class="sync-status offline" id="syncStatusDot"></span>
    </span>
    
    <button class="btn" id="runBtn">Run</button>
    <button class="btn" id="exportHtmlBtn">Export HTML</button>
  </header>

  <!-- Hidden Menu (Hamburger) -->
  <div class="menu" id="menu">
    <!-- Cloud Projects Section (Dynamic) -->
    <h4>☁️ Cloud Projects (Gmail)</h4>
    <div id="cloudProjectsList" style="max-height:150px; overflow-y:auto; margin-bottom:8px;">
      <div class="cloud-project-item" style="text-align:center; color:var(--muted);">Sign in to see cloud projects</div>
    </div>
    
    <div class="row">
      <input id="projectName" placeholder="Project name" style="flex:2" />
      <button class="btn cloud-btn" id="saveCloudBtn" title="Save to cloud">☁️ Save</button>
    </div>
    
    <div class="row">
      <button class="btn full-width cloud-btn" id="refreshCloudBtn">🔄 Refresh Cloud List</button>
    </div>
    
    <h4>📁 Local Projects</h4>
    <div class="row">
      <select id="projectList" style="flex:1"></select>
      <button class="btn" id="loadProjectBtn">Load</button>
    </div>
    <div class="row">
      <button class="btn" id="saveProjectBtn">Save Locally</button>
      <button class="btn" id="deleteProjectBtn">Delete</button>
    </div>

    <!-- AI Features -->
    <h4>🤖 AI Features</h4>
    <div class="row">
      <button class="btn" id="explainCodeBtn">Explain Code</button>
      <button class="btn" id="debugCodeBtn">Debug</button>
      <button class="btn" id="optimizeCodeBtn">Optimize</button>
      <button class="btn" id="generateTestsBtn">Tests</button>
    </div>

    <!-- Version Control -->
    <h4>📚 Version Control</h4>
    <div class="row">
      <input id="versionLabel" placeholder="Version label" style="flex:1" />
      <button class="btn" id="saveVersionBtn">Save</button>
    </div>
    <div class="row">
      <button class="btn" id="viewHistoryBtn">History</button>
      <button class="btn" id="compareVersionsBtn">Compare</button>
    </div>

    <!-- Templates -->
    <h4>📋 Templates</h4>
    <div class="row">
      <button class="btn" id="reactTemplateBtn">React</button>
      <button class="btn" id="vueTemplateBtn">Vue</button>
      <button class="btn" id="p5TemplateBtn">p5.js</button>
      <button class="btn" id="threeTemplateBtn">Three.js</button>
    </div>

    <!-- Testing -->
    <h4>🧪 Testing</h4>
    <div class="row">
      <button class="btn" id="runTestsBtn">Run Tests</button>
      <button class="btn" id="codeCoverageBtn">Coverage</button>
      <button class="btn" id="performanceTestBtn">Performance</button>
    </div>

    <!-- Editor Settings -->
    <h4>⚙️ Editor Settings</h4>
    <div class="row">
      <button class="btn" id="formatBtn">Format</button>
      <button class="btn" id="toggleWrapBtn">Toggle Wrap</button>
      <button class="btn" id="triggerHintBtn">Hint</button>
      <button class="btn" id="clearConsoleBtn">Clear Console</button>
    </div>
    
    <div class="row">
      <button class="btn" id="toggleLintBtn">Toggle Lint</button>
      <button class="btn" id="emmetInfoBtn">Emmet Info</button>
    </div>

    <!-- Mobile Preview Sizes -->
    <h4>📱 Preview Size</h4>
    <div class="row size-buttons">
      <button class="btn" data-w="375">375px</button>
      <button class="btn" data-w="390">390px</button>
      <button class="btn" data-w="428">428px</button>
      <button class="btn" data-w="360">360px</button>
      <button class="btn" data-w="768">768px</button>
      <button class="btn" data-w="100%">Full</button>
    </div>

    <!-- Themes -->
    <h4>🎨 Themes</h4>
    <div class="row">
      <select id="themeSelect" style="flex:1">
        <option value="dracula">Dracula</option>

// ==================== CLOUD FUNCTIONS ====================
async function loadCloudProjects() {
  if (!auth || !currentUser || !db) {
    document.getElementById('cloudProjectsList').innerHTML = 
      '<div class="cloud-project-item" style="text-align:center; color:var(--muted);">Sign in to see cloud projects</div>';
    return;
  }
  
  syncStatusDot.className = 'sync-status syncing';
  
  try {
    const snapshot = await db.collection('projects')
      .where('userId', '==', currentUser.uid)
      .orderBy('updatedAt', 'desc')
      .get();
    
    cloudProjects = [];
    const container = document.getElementById('cloudProjectsList');
    container.innerHTML = '';
    
    if (snapshot.empty) {
      container.innerHTML = '<div class="cloud-project-item" style="text-align:center; color:var(--muted);">No cloud projects yet</div>';
    } else {
      snapshot.forEach(doc => {
        const data = doc.data();
        const project = { id: doc.id, ...data };
        cloudProjects.push(project);
        
        const item = document.createElement('div');
        item.className = 'cloud-project-item';
        item.dataset.id = doc.id;
        
        const date = data.updatedAt?.toDate() || new Date();
        const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        
        item.innerHTML = `
          <div class="cloud-project-name">${escapeHtml(data.name || 'Unnamed')}</div>
          <div class="cloud-project-date">📅 ${dateStr}</div>
        `;
        
        item.addEventListener('click', () => loadCloudProject(doc.id));
        container.appendChild(item);
      });
    }
    
    syncStatusDot.className = 'sync-status online';
  } catch (error) {
    console.error('❌ Error loading cloud projects:', error);
    document.getElementById('cloudProjectsList').innerHTML = 
      '<div class="cloud-project-item" style="text-align:center; color:#ef4444;">Error loading projects</div>';
    syncStatusDot.className = 'sync-status offline';
  }
}

async function saveToCloud() {
  if (!auth || !currentUser) {
    alert('Please sign in first');
    return;
  }
  
  const projectName = document.getElementById('projectName').value.trim();
  if (!projectName) {
    alert('Enter a project name');
    return;
  }
  
  syncStatusDot.className = 'sync-status syncing';
  
  const projectData = {
    name: projectName,
    html: editors.html.getValue(),
    css: editors.css.getValue(),
    js: editors.js.getValue(),
    theme: localStorage.getItem('cmTheme') || 'dracula',
    fontSize: localStorage.getItem('fontSize') || '14',
    wrap: localStorage.getItem('wrap') || 'false',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    userId: currentUser.uid,
    userEmail: currentUser.email
  };
  
  try {
    // Check if project exists
    const query = await db.collection('projects')
      .where('userId', '==', currentUser.uid)
      .where('name', '==', projectName)
      .get();
    
    if (!query.empty) {
      // Update existing
      await db.collection('projects').doc(query.docs[0].id).update(projectData);
      alert(`✅ Project "${projectName}" updated in cloud!`);
    } else {
      // Create new
      await db.collection('projects').add({
        ...projectData,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      alert(`✅ Project "${projectName}" saved to cloud!`);
    }
    
    loadCloudProjects();
    syncStatusDot.className = 'sync-status online';
  } catch (error) {
    console.error('❌ Save error:', error);
    alert('Error saving to cloud: ' + error.message);
    syncStatusDot.className = 'sync-status offline';
  }
}

async function loadCloudProject(projectId) {
  if (!auth || !currentUser) return;
  
  syncStatusDot.className = 'sync-status syncing';
  
  try {
    const doc = await db.collection('projects').doc(projectId).get();
    if (doc.exists) {
      const data = doc.data();
      
      if (confirm(`Load "${data.name}" from cloud? Current code will be replaced.`)) {
        editors.html.setValue(data.html || '');
        editors.css.setValue(data.css || '');
        editors.js.setValue(data.js || '');
        
        if (data.theme) setTheme(data.theme);
        if (data.fontSize) {
          document.getElementById('fontSize').value = data.fontSize;
          applyFontSize(data.fontSize);
        }
        
        if (data.wrap) {
          const wrap = JSON.parse(data.wrap);
          Object.values(editors).forEach(ed => ed.setOption('lineWrapping', wrap));
        }
        
        document.getElementById('projectName').value = data.name;
        run();
        alert('✅ Project loaded from cloud!');
      }
    }
    syncStatusDot.className = 'sync-status online';
  } catch (error) {
    console.error('❌ Load error:', error);
    alert('Error loading from cloud: ' + error.message);
    syncStatusDot.className = 'sync-status offline';
  }
}

// ==================== CODE MIRROR SETUP ====================
function initEditor(id, mode) {
  const ed = CodeMirror.fromTextArea(document.getElementById(id), {
    mode,
    lineNumbers: true,
    theme: localStorage.getItem('cmTheme') || 'dracula',
    autoCloseTags: true,
    autoCloseBrackets: true,
    matchBrackets: true,
    gutters: ["CodeMirror-lint-markers"],
    lint: true,
    lineWrapping: JSON.parse(localStorage.getItem('wrap') || 'false'),
    extraKeys: {
      "Ctrl-Space": "autocomplete",
      "Ctrl-E": (cm) => tryEmmet(cm),
      "Tab": (cm) => {
        if (tryEmmet(cm)) return;
        if (cm.somethingSelected()) cm.indentSelection("add");
        else cm.replaceSelection("  ");
      }
    }
  });
  ed.on('change', () => { autosave(); schedulePreview(); });
  ed.getWrapperElement().style.fontSize = (localStorage.getItem('fontSize') || '14') + 'px';
  return ed;
}

editors.html = initEditor('html', 'htmlmixed');
editors.css = initEditor('css', 'css');
editors.js = initEditor('js', 'javascript');

// ==================== EMMET SUPPORT ====================
function tryEmmet(cm) {
  try {
    if (window.emmetCodeMirror) {
      return window.emmetCodeMirror.expandAbbreviation(cm);
    }
  } catch (e) {}
  return false;
}

function show(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  ['html', 'css', 'js'].forEach(id => {
    editors[id].getWrapperElement().style.display = (id === tab) ? 'block' : 'none';
  });
  active = tab;
}

});

// ==================== PREVIEW WITH CONSOLE ====================
const preview = document.getElementById('preview');
let runTimer;

function schedulePreview() {
  clearTimeout(runTimer);
  runTimer = setTimeout(run, 400);
  setSaving(true);
}

function run() {
  const html = editors.html.getValue();
  const css = `<style>${editors.css.getValue()}</style>`;
  const js = `
<script>
(function() {
  const parent = window.parent;
  const send = (type, payload) => parent.postMessage({type, payload}, "*");
  
  // Capture console
  const origLog = console.log;
  console.log = function() { 
    send("log", Array.from(arguments).join(" ")); 
    origLog.apply(console, arguments);
  };
  
  window.onerror = function(msg, url, line, col, err) { 
    send("error", msg + " @" + line + ":" + col);
    return true;
  };
  
  try { 
    ${editors.js.getValue()} 
  } catch(e) { 
    send("error", e.message || e); 
  }
})();
<\/script>`;
  preview.srcdoc = html + css + js;
  setSaving(false);
}

document.getElementById('runBtn').addEventListener('click', run);

// Receive logs from iframe
window.addEventListener('message', (e) => {
  if (!e?.data?.type) return;
  const el = document.createElement('div');
  el.textContent = (e.data.type === 'log' ? '▶ ' : '⛔ ') + e.data.payload;
  if (e.data.type === 'error') el.className = 'err';
  consoleBox.appendChild(el);
  consoleBox.scrollTop = consoleBox.scrollHeight;
});

// ==================== RESIZER ====================
const resizer = document.getElementById('resizer');
const leftPane = document.getElementById('leftPane');
let dragging = false;
let startX, startWidth;

resizer.addEventListener('mousedown', startResize);
resizer.addEventListener('touchstart', startResize, { passive: false });

function startResize(e) {
  e.preventDefault();
  dragging = true;
  startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
  startWidth = leftPane.offsetWidth;
  document.body.style.userSelect = 'none';
  document.body.style.cursor = 'col-resize';
}

window.addEventListener('mousemove', resize);
window.addEventListener('touchmove', resize, { passive: false });
window.addEventListener('mouseup', stopResize);
window.addEventListener('touchend', stopResize);

function resize(e) {
  if (!dragging) return;
  e.preventDefault();
  
  const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
  const dx = clientX - startX;
  const total = document.querySelector('.wrap').clientWidth;
  let newWidth = Math.min(Math.max(startWidth + dx, 240), total - 260);
  
  leftPane.style.flex = `0 0 ${newWidth}px`;
}

function stopResize() {
  dragging = false;
  document.body.style.userSelect = '';
  document.body.style.cursor = '';
}

});

const themeCDN = (name) => {
  const map = {
    "dracula": "dracula",
    "monokai": "monokai",
    "material": "material",
    "material-darker": "material-darker",
    "solarized": "solarized",
    "elegant": "elegant",
    "neo": "neo"
  };
  const file = map[name] || "dracula";
  return `https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/${file}.min.css`;
};

function setTheme(name) {
  const link = document.getElementById('cm-theme');
  link.href = themeCDN(name);
  Object.values(editors).forEach(ed => ed.setOption('theme', name));
  localStorage.setItem('cmTheme', name);
}

}

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
    e.preventDefault();
    run();
  }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'b') {
    e.preventDefault();
    editors[active].undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
    e.preventDefault();

function showModal(title, content) {
  modalTitle.textContent = title;
  modalBody.innerHTML = content;

}

  modal.classList.remove('show');

}

// ==================== VERSION CONTROL (Local) ====================
document.getElementById('saveVersionBtn').addEventListener('click', () => {
  const label = document.getElementById('versionLabel').value.trim() || 'Unnamed Version';
  const version = {
    label: label,
    timestamp: new Date().toISOString(),
    html: editors.html.getValue(),
    css: editors.css.getValue(),
    js: editors.js.getValue()
  };
  
  const versions = JSON.parse(localStorage.getItem('codeVersions') || '[]');
  versions.unshift(version);
  if (versions.length > 20) versions.length = 20;
  
  localStorage.setItem('codeVersions', JSON.stringify(versions));
  document.getElementById('versionLabel').value = '';
  alert(`Version "${label}" saved locally`);
});

document.getElementById('viewHistoryBtn').addEventListener('click', () => {
  const versions = JSON.parse(localStorage.getItem('codeVersions') || '[]');
  
  if (versions.length === 0) {
    showModal('📚 Version History', '<p>No saved versions yet.</p>');
    return;
  }
  
  let historyHTML = '<h4>Saved Versions (click to restore)</h4>';
  versions.forEach((v, i) => {
    const date = new Date(v.timestamp).toLocaleString();
    historyHTML += `<div class="version-item" data-index="${i}">
      <div class="version-label">${v.label}</div>
      <div class="version-time">${date}</div>
    </div>`;
  });
  
  showModal('📚 Version History', historyHTML);
  
  setTimeout(() => {
    document.querySelectorAll('.version-item').forEach(item => {
      item.addEventListener('click', () => {
        const index = parseInt(item.dataset.index);
        const version = versions[index];
        if (confirm(`Restore "${version.label}"?`)) {
          editors.html.setValue(version.html);
          editors.css.setValue(version.css);
          editors.js.setValue(version.js);
          run();
          hideModal();
        }
      });
    });
  }, 100);
});

document.getElementById('compareVersionsBtn').addEventListener('click', () => {
  showModal('🔍 Compare Versions', '<p>Select versions to compare (requires at least 2 saved versions)</p>');
});

document.getElementById('exportZipBtn').addEventListener('click', async () => {
  const zip = new JSZip();
  zip.file('index.html', editors.html.getValue());
  zip.file('styles.css', editors.css.getValue());
  zip.file('script.js', editors.js.getValue());
  const blob = await zip.generateAsync({ type: 'blob' });
  saveAs(blob, 'project.zip');
});

document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  
  if (file.name.endsWith('.zip')) {
    const data = await file.arrayBuffer();
    const zip = await JSZip.loadAsync(data);
    
    const html = await (zip.file('index.html')?.async('text') || '');
    const css = await (zip.file('styles.css')?.async('text') || '');
    const js = await (zip.file('script.js')?.async('text') || '');
    
    if (html) editors.html.setValue(html);
    if (css) editors.css.setValue(css);
    if (js) editors.js.setValue(js);
    run();
    alert('ZIP imported');
  } else if (/\.(html|htm)$/i.test(file.name)) {
    const text = await file.text();
    editors.html.setValue(text);
    run();
    alert('HTML imported');
  }
  
  e.target.value = '';
});
